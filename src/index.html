<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Document</title>
  </head>
  <body>
    <h1>Olá Mundo!</h1>

    <input type="text" id="inputMensagem" />
    <button id="btn">Enviar mensagem</button>
    <script>
      const inputMensagem = document.getElementById('inputMensagem');
      const btn = document.getElementById('btn');
      let mensagem = '';

      function handleMensagem() {
        mensagem = inputMensagem.value;
      }

      function handleClick() {
        window.api.consoleLog(mensagem);
      }
      inputMensagem.addEventListener('keyup', handleMensagem);
      btn.addEventListener('click', handleClick);
    </script>
  </body>
</html>
